<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <title>Práctica (para la clase)</title>
        <style>
            * {
                margin: 0;
                padding: 0;
            }

            body {
                text-align: center;
                font-family: Helvetica, Arial, sans-serif;
            }

            h1 { padding: 1vh 15vw; }
            h2, p { padding: .5vh 0; }

            header, article, footer { padding: 5vh 0; }
            header, article { border-bottom: 1px dotted black; }

            div { padding: 2vh 6vw; }
        </style>
    </head>
    <body>

        <header>
            <h1>Tufte refers to data-ink as the non-erasable ink used for the presentation of data</h1>
        </header>

        <main>

            <!-- GRÁFICA 1: línea de tiempo -->
            <article>
                <h2>Evolución de la población en La Florida y Las Condes</h2>
                <p>Con una <a href="https://datavizcatalogue.com/ES/metodos/grafica_de_linea.html" target="_blank">gráfica de línea</a></p>
                <div>
                    <svg viewBox="0 0 650 210">
                        <!-- El grupo se voltea verticalmente para que Y crezca hacia arriba (en SVG crece hacia abajo por defecto) -->
                        <g transform="translate(0,195) scale(1,-1)" id="lineas"></g>
                        <g id="years"></g>
                    </svg>
                </div>
            </article>

            <!-- GRÁFICA 2: barras horizontales -->
            <article>
                <h2>Población en las distintas comunas de Chile</h2>
                <p>Con una <a href="https://datavizcatalogue.com/ES/metodos/graficos_de_barras.html" target="_blank">gráfica de barras</a></p>
                <div>
                    <svg viewBox="0 0 400 170" id="barras"></svg>
                </div>
            </article>

        </main>

        <footer>
            <p><small>Revisar lo de Data-Ink Ratio en <a href="https://infovis-wiki.net/wiki/Data-Ink_Ratio" target="_blank">infovis</a></small></p>
        </footer>

        <script>
            // ── GRÁFICA 1: línea ──────────────────────────────────────────────

            // Fuente: https://es.wikipedia.org/wiki/Anexo:Crecimiento_poblacional_de_Santiago_de_Chile
            var lineal = {
                censos:   [1982, 1992, 2002, 2017, 2024],
                censados: [285492, 328767, 365563, 366799, 374836]
            };

            // FIX: no encontré info del censo de 1982 así que repetí el número glup
            var lineal2 = {
                censos:   [1982, 1992, 2002, 2017, 2024],
                censados: [205359, 205359, 246474, 294838, 343632]
            };

            // FIX: calcular min/max una sola vez, fuera del forEach
            var todasLasPoblaciones = lineal.censados.concat(lineal2.censados);
            var minPob = Math.min(...todasLasPoblaciones);
            var maxPob = Math.max(...todasLasPoblaciones);

            // FIX: espaciado ajustado para que quepan los 5 puntos en el viewBox (0-650)
            var paso = 150;
            var offsetX = 20;

            function calcularCoordenadas(datos) {
                return datos.map(function(poblacion, i) {
                    var x = offsetX + (i * paso);
                    var y = Math.round(((poblacion - minPob) / (maxPob - minPob)) * 150);
                    return x + "," + y;
                }).join(" ");
            }

            // Dibujamos las dos líneas
            var coordenadas1 = calcularCoordenadas(lineal.censados);
            var coordenadas2 = calcularCoordenadas(lineal2.censados);

            document.querySelector("#lineas").innerHTML =
                `<polyline points="${coordenadas1}" fill="none" stroke="#DE1212" stroke-width="3" />` +
                `<polyline points="${coordenadas2}" fill="none" stroke="#1277DE" stroke-width="3" />`;

            // Etiquetas de años (compartidas, usan los mismos censos)
            var etiquetas = "";
            lineal.censos.forEach(function(anio, i) {
                var x = offsetX + (i * paso) - 6;
                etiquetas += `<text x="${x}" y="205" font-size="6">${anio}</text>`;
            });

            // Leyenda
            etiquetas += `<text x="5"  y="12" font-size="7" fill="#DE1212">● La Florida</text>`;
            etiquetas += `<text x="5"  y="22" font-size="7" fill="#1277DE">● Las Condes</text>`;

            document.querySelector("#years").innerHTML = etiquetas;


            // ── GRÁFICA 2: barras ─────────────────────────────────────────────

            // Fuente: https://es.wikipedia.org/wiki/Anexo:Regiones_de_Chile_por_población
            var regiones = [
                { region: "Puente Alto (RM)",              numero: 573935 },
                { region: "Maipú (RM)",                    numero: 521627 },
                { region: "Santiago (RM)",                  numero: 498698 },
                { region: "La Florida (RM)",                numero: 366376 },
                { region: "Antofagasta (Antofagasta)",      numero: 348517 },
                { region: "Viña del Mar (Valpo.)",          numero: 332875 },
                { region: "San Bernardo (RM)",              numero: 301313 },
                { region: "Valparaíso (Valpo.)",            numero: 296555 },
                { region: "Las Condes (RM)",                numero: 294838 },
                { region: "Temuco (Temuco)",                numero: 282415 },
                { region: "Puerto Montt (Puerto Montt)",    numero: 245902 }
            ];

            regiones.forEach(function(d, i) {
                var ancho = d.numero / 1700;

                document.querySelector("#barras").innerHTML +=
                    `<g transform="translate(0, ${i * 15})">
                        <rect x="0" y="0" width="${ancho}" height="10" fill="#8619B8" />
                        <text x="3" y="7" fill="white" font-size="5">${d.region}</text>
                        <text x="${ancho + 3}" y="7" font-size="6">${new Intl.NumberFormat("es-ES").format(d.numero)} habitantes</text>
                    </g>`;
            });
        </script>
    </body>
</html>
